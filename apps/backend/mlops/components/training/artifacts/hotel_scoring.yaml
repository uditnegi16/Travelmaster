entity: hotel
scoring_type: weighted_sum

weights:
  rating: 0.45
  star_category: 0.25
  price_per_night: 0.30

normalization:
  rating: min_max
  star_category: min_max
  price_per_night: inverse_min_max

filters:
  min_rating: 0.0
  max_price_per_night: null
  # FIX: was true — caused all hotels to be dropped when city field
  # didn't exactly match. session_routes.py now enriches rows with city.
  city_required: false

ranking:
  sort_by: score
  order: descending
  top_k: 2
