entity: flight
scoring_type: weighted_sum

weights:
  price: 0.45
  duration_minutes: 0.35
  airline: 0.10
  cabin_class: 0.10

normalization:
  price: inverse_min_max
  duration_minutes: inverse_min_max

filters:
  # FIX: was true — caused ALL agent flights to be dropped because
  # agent data doesn't always include origin/destination fields.
  # The session_routes.py now enriches rows before ranking.
  origin_required: false
  destination_required: false
  max_price: null
  max_duration_minutes: null

ranking:
  sort_by: score
  order: descending
  top_k: 3
